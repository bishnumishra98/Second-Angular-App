<div class="row">
    <div class="col-7">
        <div class="card">
            <div class="card-header bg-warning">
                Photos List
            </div>
            <div class="card-body">
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>Sr No.</th>
                            <th>Title</th>
                            <th>URL</th>
                            <th>Thumbnail</th>
                        </tr>
                    </thead>
                    <tbody>
                        @for (item of photosList; track $index) {
                            <tr>
                                <td>{{ $index + 1 }}</td>
                                <td>{{ item.title }}</td>
                                <td>{{ item.url }}</td>
                                <td>{{ item.thumbnailUrl }}</td>
                            </tr>
                            <!-- <tr>
                                <td>1</td>
                                <td>testTitle</td>
                                <td>testURL</td>
                                <td>testThumbnail</td>
                            </tr> -->
                        }
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="col-5">
        <div class="card">
            <div class="card-header bg-warning">
                Photos List
            </div>
            <div class="card-body">
                <form>
                    <div class="row">
                        <div class="col-6">
                            <label>AlbumId</label>
                            <input type="text" class="form-control">
                        </div>
                        <div class="col-6">
                            <label>Title</label>
                            <input type="text" class="form-control">
                        </div>
                        <div class="col-6">
                            <label>URL</label>
                            <input type="text" class="form-control">
                        </div>
                        <div class="col-6">
                            <label>Thumbnail</label>
                            <input type="text" class="form-control">
                        </div>
                    </div>
                    <div class="row pt-2">
                        <div class="col-6 text-center">
                            <button class="btn btn-secondary">Reset</button>
                        </div>
                        <div class="col-6 text-center">
                            <button class="btn btn-success">Save</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
